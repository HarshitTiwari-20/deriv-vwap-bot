services:
  redis:
    image: redis:7-alpine
    container_name: algo-vwap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: algo-vwap-bot
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      DERIV_LEVERAGE: ${DERIV_LEVERAGE:-10}
      DERIV_MARGIN_TYPE: ${DERIV_MARGIN_TYPE:-isolated}
      NODE_ENV: production
    ports:
      - "3100:3100"
      - "3101:3101"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: algo-vwap-dashboard
    restart: unless-stopped
    depends_on:
      - bot
    environment:
      BOT_API_URL: http://bot:3100
      NEXT_PUBLIC_BOT_API_URL: http://localhost:3100
      NEXT_PUBLIC_BOT_WS_URL: ws://localhost:3101
    ports:
      - "3000:3000"

volumes:
  redis-data:
